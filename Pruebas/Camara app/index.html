<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cámara de Seguridad</title>
    <style>
        body {
            background-color: #111;
            color: white;
            text-align: center;
            font-family: sans-serif;
        }
        /* Esto hace que el video ocupe un buen espacio en la pantalla */
        video {
            width: 90%;
            max-width: 800px;
            border: 2px solid #444;
            border-radius: 8px;
            margin-top: 20px;
            background-color: #000;
        }
    </style>
</head>
<body>

    <h1>Transmisor de Cámara</h1>
    <video id="miCamara" autoplay playsinline></video>

    <script>
        // Seleccionamos el elemento de video de arriba
        const videoElemento = document.getElementById('miCamara');

        // Pedimos permiso para usar la cámara
        async function iniciarCamara() {
            try {
                // Configuramos lo que queremos capturar. 
                // Por ahora es básico, pero más adelante aquí es donde podremos 
                // forzar resoluciones extremas (como 4K o superiores) para 
                // extraer el máximo nivel de detalle y nitidez del sensor.
                const configuracion = { 
                    video: true, 
                    audio: false // Apagamos el audio por ahora
                };

                // Accedemos a la cámara
                const flujoDeVideo = await navigator.mediaDevices.getUserMedia(configuracion);
                
                // Conectamos la cámara al elemento de video en la pantalla
                videoElemento.srcObject = flujoDeVideo;

            } catch (error) {
                console.error("Error al acceder a la cámara: ", error);
                alert("No se pudo acceder a la cámara. Revisa los permisos.");
            }
        }

        // Ejecutamos la función al cargar la página
        iniciarCamara();
    </script>

</body>
</html>
